name: CI/CD Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

concurrency:
  group: desktop-fushi-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Cargo package version
        id: version
        shell: bash
        env:
          RELEASE_REF_NAME: ${{ github.ref_name }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          from pathlib import Path

          in_package = False
          for raw_line in Path("Cargo.toml").read_text(encoding="utf-8").splitlines():
              line = raw_line.split("#", 1)[0].strip()
              if not line:
                  continue
              if line == "[package]":
                  in_package = True
                  continue
              if line.startswith("[") and line.endswith("]"):
                  in_package = False
                  continue
              if not in_package:
                  continue
              key, sep, value = line.partition("=")
              if sep and key.strip() == "version":
                  print(value.strip().strip('"').strip("'"))
                  break
          else:
              raise SystemExit("Cargo package version not found")
          PY
          )"
          if [[ "${RELEASE_REF_TYPE}" == "tag" ]]; then
            if [[ ! "${RELEASE_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Release tag must match vX.Y.Z: ${RELEASE_REF_NAME}" >&2
              exit 1
            fi
            if [[ "${RELEASE_REF_NAME}" != "v${version}" ]]; then
              echo "::error::Release tag ${RELEASE_REF_NAME} does not match Cargo package version v${version}" >&2
              exit 1
            fi
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

  windows:
    name: Windows ${{ matrix.arch }}
    needs: prepare
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            rust_target: x86_64-pc-windows-msvc
          - arch: arm64
            rust_target: aarch64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-${{ matrix.rust_target }}
          cache-targets: true
          save-if: ${{ github.ref_type == 'tag' }}

      - name: Build Windows ${{ matrix.arch }}
        shell: pwsh
        run: python scripts/build.py windows --arch "${{ matrix.arch }}" --release

      - name: Package Windows ${{ matrix.arch }}
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $arch = "${{ matrix.arch }}"
          $target = "${{ matrix.rust_target }}"
          $stage = "dist\desktop-fushi-v$version-windows-$arch"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item "target\$target\release\Desktop Fushi.exe" "$stage\Desktop Fushi.exe"
          Compress-Archive -Path "$stage\Desktop Fushi.exe" -DestinationPath "dist\desktop-fushi-v$version-windows-$arch.zip" -Force
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $entries = [System.IO.Compression.ZipFile]::OpenRead("dist\desktop-fushi-v$version-windows-$arch.zip")
          try {
            if ($entries.Entries.Count -ne 1 -or $entries.Entries[0].FullName -ne "Desktop Fushi.exe") {
              throw "Windows release zip must contain only Desktop Fushi.exe"
            }
          } finally {
            $entries.Dispose()
          }

      - name: Upload Windows ${{ matrix.arch }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-fushi-windows-${{ matrix.arch }}
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 7

  macos:
    name: macOS arm64 and universal
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-universal
          cache-targets: true
          save-if: ${{ github.ref_type == 'tag' }}

      - name: Build macOS universal and arm64 bundles
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build.py macos --arch universal --release
          python scripts/build.py macos --arch arm64 --release

      - name: Package macOS bundles
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          mkdir -p dist
          ditto -c -k --norsrc --keepParent \
            "target/aarch64-apple-darwin/release/Desktop Fushi.app" \
            "dist/desktop-fushi-v${version}-macos-arm64.zip"
          ditto -c -k --norsrc --keepParent \
            "target/universal-apple-darwin/release/Desktop Fushi.app" \
            "dist/desktop-fushi-v${version}-macos-universal.zip"
          python3 - <<'PY'
          from pathlib import Path
          import zipfile

          for archive in sorted(Path("dist").glob("*.zip")):
              with zipfile.ZipFile(archive) as zip_file:
                  roots = {name.split("/", 1)[0] for name in zip_file.namelist() if name}
              if roots != {"Desktop Fushi.app"}:
                  raise SystemExit(f"{archive} must contain only Desktop Fushi.app")
          PY

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-fushi-macos
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    environment: Release
    needs:
      - prepare
      - windows
      - macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path
          import zipfile

          version = os.environ["VERSION"]
          expected_files = {
              f"desktop-fushi-v{version}-windows-x64.zip",
              f"desktop-fushi-v{version}-windows-arm64.zip",
              f"desktop-fushi-v{version}-macos-arm64.zip",
              f"desktop-fushi-v{version}-macos-universal.zip",
          }
          assets = {path.name for path in Path("dist").iterdir() if path.is_file()}
          if assets != expected_files:
              raise SystemExit(f"Release assets differ from expected single-file bundles: {sorted(assets)}")

          for archive in Path("dist").glob("*windows-*.zip"):
              with zipfile.ZipFile(archive) as zip_file:
                  names = [name for name in zip_file.namelist() if name and not name.endswith("/")]
              if names != ["Desktop Fushi.exe"]:
                  raise SystemExit(f"{archive} must contain only Desktop Fushi.exe")

          for archive in Path("dist").glob("*macos-*.zip"):
              with zipfile.ZipFile(archive) as zip_file:
                  roots = {name.split("/", 1)[0] for name in zip_file.namelist() if name}
              if roots != {"Desktop Fushi.app"}:
                  raise SystemExit(f"{archive} must contain only Desktop Fushi.app")
          PY
          title="Desktop Fushi v${VERSION}"
          {
            echo "Automated build for Cargo package version ${VERSION}."
            echo
            echo "Artifacts:"
            find dist -maxdepth 1 -type f -print | sort | while IFS= read -r asset; do
              printf -- "- %s\n" "${asset##*/}"
            done
          } > release-notes.md

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --title "${title}" --notes-file release-notes.md
            gh release upload "${TAG}" dist/* --clobber
          else
            gh release create "${TAG}" dist/* --target "${GITHUB_SHA}" --title "${title}" --notes-file release-notes.md
          fi

  deploy_web:
    name: Deploy website to Vercel
    environment: Release
    needs:
      - prepare
      - release
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    env:
      PUBLIC_DESKTOP_FUSHI_VERSION: ${{ needs.prepare.outputs.version }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Rust wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        shell: bash
        run: cargo install wasm-bindgen-cli --version 0.2.122 --locked

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Pull Vercel project settings
        working-directory: web
        run: npx vercel@48.12.0 pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel output
        working-directory: web
        run: npx vercel@48.12.0 build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt website
        working-directory: web
        run: npx vercel@48.12.0 deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
