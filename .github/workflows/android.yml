name: Android

on:
  push:
    branches:
      - main
      - android
    paths:
      - ".github/workflows/android.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "android/**"
      - "scripts/build.py"
      - "scripts/build_android_rust.py"
  pull_request:
    paths:
      - ".github/workflows/android.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "android/**"
      - "scripts/build.py"
      - "scripts/build_android_rust.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-fushi-android-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  ANDROID_NDK_VERSION: 28.2.13676358

jobs:
  build:
    name: Android arm64 debug
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK and NDK
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: android-arm64
          cache-targets: true
          cache-on-failure: true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.10.2"
          cache-provider: basic

      - name: Build Android arm64 debug APK
        shell: bash
        run: python scripts/build.py android --variant debug --abis arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: desktop-fushi-android-arm64-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
