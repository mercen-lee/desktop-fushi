name: CI · Quality

on:
  push:
    branches:
      - main
      - android
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality:
    name: Rust quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libdbus-1-dev libgtk-3-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-quality
          cache-targets: true
          cache-on-failure: true

      - name: Run quality checks
        run: python scripts/ci.py quality
