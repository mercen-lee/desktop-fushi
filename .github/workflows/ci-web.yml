name: CI · Web

on:
  push:
    branches:
      - main
      - android
    paths:
      - ".github/workflows/ci-web.yml"
      - "scripts/ci.py"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "src/**"
      - "assets/**"
      - "vercel.json"
      - "web/**"
  pull_request:
    paths:
      - ".github/workflows/ci-web.yml"
      - "scripts/ci.py"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"
      - "src/**"
      - "assets/**"
      - "vercel.json"
      - "web/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: WebAssembly and Astro build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Rust wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-web
          cache-targets: true
          cache-on-failure: true

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.122 --locked

      - name: Build website
        run: python scripts/ci.py web
